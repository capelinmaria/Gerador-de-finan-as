<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Financeiro 50/30/20</title>
    <style>
        /* Reset básico e fontes */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        /* Container Principal */
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        /* Formulário */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #7f8c8d;
        }

        input {
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #3498db;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        /* Resultados */
        #saida {
            margin-top: 25px;
            border-top: 2px solid #f1f2f6;
            padding-top: 20px;
        }

        .card-resultado {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            font-weight: 500;
        }

        .necessidades { background-color: #e8f4fd; color: #2980b9; }
        .desejos { background-color: #fef9e7; color: #f39c12; }
        .investimentos { background-color: #e8f8f5; color: #27ae60; }

        .valor-calc {
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gerenciador 50/30/20</h1>
        
        <div class="form-group">
            <label for="valor">Digite o valor total (R$)</label>
            <input type="number" id="valor" placeholder="Ex: 3000" min="0" step="0.01">
        </div>
        
        <button onclick="calcular()">Calcular Divisão</button>
        
        <div id="saida"></div>
    </div>

    <script>
        function calcular() {
            // Correção dos erros de digitação (document, const e fechamento de parênteses)
            const valorInput = document.getElementById('valor').value;
            const valor = parseFloat(valorInput);
            const saida = document.getElementById('saida');

            if (isNaN(valor) || valor <= 0) {
                alert('Por favor, insira um número válido e maior que zero.');
                return;
            }

            const necessidades = valor * 0.5;
            const desejos = valor * 0.3;
            const investimentos = valor * 0.2;

            // HTML estruturado com classes CSS para as cores de cada categoria
            saida.innerHTML = `
                <div class="card-resultado necessidades">
                    <span>Necessidades (50%):</span>
                    <span class="valor-calc">R$ ${necessidades.toFixed(2)}</span>
                </div>
                <div class="card-resultado desejos">
                    <span>Desejos (30%):</span>
                    <span class="valor-calc">R$ ${desejos.toFixed(2)}</span>
                </div>
                <div class="card-resultado investimentos">
                    <span>Investimentos (20%):</span>
                    <span class="valor-calc">R$ ${investimentos.toFixed(2)}</span>
                </div>
            `;
        }
    </script>
</body>
</html>
